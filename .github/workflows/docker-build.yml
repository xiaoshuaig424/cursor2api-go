name: Build Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cursor2api-go41268:latest
          build-args: |
            PORT=${{ secrets.PORT }}
            DEBUG=${{ secrets.DEBUG }}
            API_KEY=${{ secrets.API_KEY }}
            MODELS=${{ secrets.MODELS }}
            SYSTEM_PROMPT_INJECT=${{ secrets.SYSTEM_PROMPT_INJECT }}
            TIMEOUT=${{ secrets.TIMEOUT }}
            KILO_TOOL_STRICT=${{ secrets.KILO_TOOL_STRICT }}
            MAX_INPUT_LENGTH=${{ secrets.MAX_INPUT_LENGTH }}
            USER_AGENT=${{ secrets.USER_AGENT }}
            UNMASKED_VENDOR_WEBGL=${{ secrets.UNMASKED_VENDOR_WEBGL }}
            UNMASKED_RENDERER_WEBGL=${{ secrets.UNMASKED_RENDERER_WEBGL }}
            SCRIPT_URL=${{ secrets.SCRIPT_URL }}

